<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="assets/styles/home-style.css" />
    <title>HTML dengan Formulir Input</title>
  </head>
  <body>
    <div class="container">
      <h2>Data Mahasiswa</h2>
    </div>
    <form>
      <div class="form-group">
        <label for="nim">NIM:</label>
        <input type="text" id="nim" name="nim" required />
      </div>
    
      <div class="form-group">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required />
      </div>
    
      <div class="form-group">
        <label for="jurusan">Jurusan:</label>
        <input type="text" id="jurusan" name="jurusan" required />
      </div>
    </form>
    
    <button type="button" onclick="addData()">Tambah Data</button>

    <table id="data-table">
      <thead>
        <tr>
          <th>NIM</th>
          <th>Nama</th>
          <th>Jurusan</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data akan ditambahkan secara dinamis melalui JavaScript -->
      </tbody>
    </table>
    <script src="assets/scripts/home.js">
     
    </script>
  </body>
</html>
